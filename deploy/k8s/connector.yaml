apiVersion: apps/v1
kind: Deployment
metadata:
  name: airpc-connector
  labels:
    app.kubernetes.io/name: airpc-connector
    app.kubernetes.io/part-of: airpc
spec:
  # Connectors are stateless queue-group members; scale by adding replicas.
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: airpc-connector
  template:
    metadata:
      labels:
        app.kubernetes.io/name: airpc-connector
        app.kubernetes.io/part-of: airpc
    spec:
      containers:
        - name: connector
          image: ghcr.io/terion-name/airpc:latest
          command: ["/bin/sh", "-c"]
          # The pod name is a valid connector id (lowercase alphanumerics and
          # dashes) and keeps ids unique across replicas.
          args:
            - exec /usr/local/bin/airpc connector start --config /etc/airpc/airpc.yaml --id "$POD_NAME"
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          ports:
            - name: metrics
              containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/airpc
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: airpc-config
