nats:
  url: nats://127.0.0.1:4222
  name: airpc-dev

connector:
  id: dev-connector-1

defaults:
  request_timeout: 30s
  max_request_bytes: 4MiB
  max_response_bytes: 16MiB

routes:
  - name: demo
    target: http://127.0.0.1:8080
    connectors: [dev-connector-1]
    allow_headers:
      - accept
      - content-type
      - x-request-id
